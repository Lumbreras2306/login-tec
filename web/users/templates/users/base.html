<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pokemon Searcher{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="site-branding">
            <a href="{% url 'home' %}">Pokemon Searcher</a>
            <p>Listado simple con PokeAPI</p>
            <div class="header-actions">
                {% if user.is_authenticated %}
                    <a class="header-button" href="{% url 'logout' %}">Cerrar sesion</a>
                {% else %}
                    <a class="header-button" href="{% url 'login' %}">Iniciar sesion</a>
                {% endif %}
            </div>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Pokemon Searcher 2026</p>
    </footer>
    {% block extra_js %}{% endblock %}
</body>
</html>
